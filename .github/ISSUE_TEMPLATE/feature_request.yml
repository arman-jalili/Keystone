name: Feature Request
description: Suggest a new feature or improvement for Keystone
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem you're trying to solve.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What use case does it address?
      placeholder: "As a developer, I want to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should the feature work? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Backend (Java/Spring Boot)
        - Frontend (Next.js)
        - CLI (Go)
        - Docker/Deployment
        - Documentation
        - New Feature (cross-cutting)

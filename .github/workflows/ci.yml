# =============================================================================
# Keystone — CI Pipeline
# =============================================================================
name: CI

on:
  push:
    branches: [ "main", "feat/**", "fix/**" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ "main" ]

env:
  JAVA_VERSION: "21"
  MAVEN_VERSION: "3.9"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Build backend ──────────────────────────────────────────────────────────
  build-backend:
    name: "Build Backend (Java ${{ env.JAVA_VERSION }})"
    runs-on: ubuntu-latest
    container:
      image: maven:3.9-eclipse-temurin-21
    steps:
      - uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile
        run: cd backend && mvn clean compile -q -B

      - name: Format check
        run: cd backend && mvn spotless:check -q -B

      - name: Run tests
        run: cd backend && mvn test -q -B

      - name: Package
        run: cd backend && mvn package -DskipTests -q -B

      - name: Archive JAR
        uses: actions/upload-artifact@v4
        with:
          name: keystone-server-jar
          path: backend/target/*.jar
          retention-days: 5

  # ── Build frontend ─────────────────────────────────────────────────────────
  build-frontend:
    name: "Build Frontend (Node.js 22)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint || true

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:run || true

  # ── Docker build ───────────────────────────────────────────────────────────
  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build keystone-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: keystone-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build keystone-dashboard
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: keystone-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

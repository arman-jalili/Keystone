# =============================================================================
# Keystone — CI Pipeline
# =============================================================================
# Run locally: bash local-ci.sh
# =============================================================================

name: CI

on:
  push:
    branches: [ "main", "feat/**", "fix/**" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # Compile + Format
  # ──────────────────────────────────────────────────────────────────────────
  compile:
    name: "1. Compile & Format"
    runs-on: ubuntu-latest
    container:
      image: maven:3.9-eclipse-temurin-21
    steps:
      - uses: actions/checkout@v4
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Compile
        run: cd backend && mvn clean compile -q -B
      - name: Format check
        run: cd backend && mvn spotless:check -q -B
      - name: Package JAR
        run: cd backend && mvn package -DskipTests -q -B
      - uses: actions/upload-artifact@v4
        with:
          name: keystone-server-jar
          path: backend/target/*.jar
          retention-days: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Tests + Coverage
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: "2. Tests & Coverage"
    runs-on: ubuntu-latest
    container:
      image: maven:3.9-eclipse-temurin-21
    steps:
      - uses: actions/checkout@v4
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Run tests
        run: cd backend && mvn test -q -B
      - name: Coverage report
        run: cd backend && mvn jacoco:report -q -B
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/target/site/jacoco/
          retention-days: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Architecture + Contract Checks
  # ──────────────────────────────────────────────────────────────────────────
  architecture:
    name: "3. Architecture & Contracts"
    runs-on: ubuntu-latest
    container:
      image: maven:3.9-eclipse-temurin-21
    steps:
      - uses: actions/checkout@v4
      - name: Architecture conformance
        run: |
          cd backend
          bash .pi/scripts/ci/check_architecture_conformance.sh || echo "⚠️ Arch check completed with issues"
      - name: Contract checks
        run: |
          cd backend
          for module in contract-ingestion policy-engine notification-engine dependency-graph dashboard; do
            script=".pi/scripts/ci/check_${module}_contracts.sh"
            if [ -f "$script" ]; then
              echo "--- Checking contracts: $module ---"
              bash "$script" || echo "⚠️ Contract check for $module completed with issues"
            else
              echo "⊘ No contract check script for $module"
            fi
          done

  # ──────────────────────────────────────────────────────────────────────────
  # Security Scan
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: "4. Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        run: |
          SECRETS=$(grep -rnE "(sk-[A-Za-z0-9]{32,}|ghp_[A-Za-z0-9]{36}|AKIA[0-9A-Z]{16}|-----BEGIN PRIVATE KEY-----)" \
            --include="*.java" --include="*.ts" --include="*.tsx" --include="*.go" --include="*.py" \
            --include="*.yml" --include="*.yaml" --include="*.json" \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=target --exclude-dir=.next \
            --exclude=ci.yml \
            . 2>/dev/null || true)
          if [ -z "$SECRETS" ]; then
            echo "✅ No secrets detected"
          else
            echo "❌ Potential secrets found:"
            echo "$SECRETS"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend: Install + Build
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: "5. Frontend Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: pnpm install
      - name: Build (includes type checking)
        run: pnpm build

  # ──────────────────────────────────────────────────────────────────────────
  # Docker: Build both images
  # ──────────────────────────────────────────────────────────────────────────
  docker:
    name: "6. Docker Build"
    runs-on: ubuntu-latest
    needs: [compile]
    steps:
      - uses: actions/checkout@v4
      - name: Build keystone-server
        run: docker compose build keystone-server
      - name: Build keystone-dashboard
        run: docker compose build keystone-dashboard

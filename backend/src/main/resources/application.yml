# =============================================================================
# Keystone Server — Spring Boot Configuration
# =============================================================================
# Profiles:
#   default / dev  — H2 in-memory database, auto DDL (local development)
#   prod           — PostgreSQL, DDL validate, production settings
#   test           — H2 in-memory, create-drop (for tests)
# =============================================================================

spring:
  application:
    name: keystone-server

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: iso

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      slo:
        http.server.requests: 10ms, 50ms, 100ms, 200ms, 500ms
      percentiles-histogram:
        http.server.requests: true
  info:
    env:
      enabled: true
    build:
      enabled: true
    git:
      enabled: true

logging:
  level:
    com.keystone: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId:-},%X{spanId:-}] - %msg%n"

info:
  app:
    name: keystone-server
    version: 0.1.0
    java-version: 21

# ─────────────────────────────────────────────────────────────────────────────
# DEV Profile — H2 in-memory, auto DDL, SQL logging
# ─────────────────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:keystone;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.keystone: DEBUG
    org.hibernate.SQL: DEBUG

info:
  app:
    profile: dev
    database: h2-in-memory

# ─────────────────────────────────────────────────────────────────────────────
# PROD Profile — PostgreSQL, DDL validate, production settings
# ─────────────────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${KEYSTONE_DB_URL:jdbc:postgresql://localhost:5432/keystone}
    username: ${KEYSTONE_DB_USERNAME:keystone}
    password: ${KEYSTONE_DB_PASSWORD:keystone}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: KeystoneCP

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

logging:
  level:
    com.keystone: INFO
    org.springframework: WARN
    org.hibernate: WARN

info:
  app:
    profile: prod
    database: postgresql

# ─────────────────────────────────────────────────────────────────────────────
# TEST Profile — H2 in-memory, create-drop, no SQL logging
# ─────────────────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
